name: Docker build and push

on:
  workflow_call:
    inputs:
        backend_image:
            type: string
            required: true
        
        frontend_image:
            type: string
            required: true
        
        tag:
          type: string
          required: false
          default: latest
          
    secrets:
      DOCKER_USERNAME :
        required : true
      DOCKER_TOKEN :
        required : true
                
jobs:
  docker:
    runs-on: ubuntu-latest     
    steps:
      - name : Checkout code 
        uses: actions/checkout@v4
        
      - name : Docker login
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name : Backend build
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ inputs.backend_image }}:${{ github.sha }} ./backend
          docker tag ${{ secrets.DOCKER_USERNAME }}/${{ inputs.backend_image }}:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/${{ inputs.backend_image}}:${{ inputs.tag }}

      - name : Backend push
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.backend_image }}:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.backend_image }}:${{ inputs.tag }}
          
      - name : Frontend build
        run : |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ inputs.frontend_image }}:${{ github.sha }} ./frontend
          docker tag ${{ secrets.DOCKER_USERNAME }}/${{ inputs.frontend_image }}:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/${{ inputs.frontend_image }}:${{ inputs.tag }}

      - name : Frontend push
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.frontend_image }}:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.frontend_image }}:${{ inputs.tag }}