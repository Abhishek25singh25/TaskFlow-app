name: Docker build and push

on:
  workflow_call:
    inputs:
      backend_image:
        type: string
        required: true
      frontend_image:
        type: string
        required: true
      tag:
        type: string
        required: false
        default: latest
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_TOKEN:
        required: true

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker login
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🔹 Backend
      - name: Backend build & tag
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/${{ inputs.backend_image }}:${{ github.sha }}
          docker build -t $IMAGE ./backend
          docker tag $IMAGE ${{ secrets.DOCKER_USERNAME }}/${{ inputs.backend_image }}:${{ inputs.tag }}

      - name: Backend push
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.backend_image }}:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.backend_image }}:${{ inputs.tag }}

      # 🔹 Frontend
      - name: Frontend build & tag
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/${{ inputs.frontend_image }}:${{ github.sha }}
          docker build -t $IMAGE ./frontend
          docker tag $IMAGE ${{ secrets.DOCKER_USERNAME }}/${{ inputs.frontend_image }}:${{ inputs.tag }}

      - name: Frontend push
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.frontend_image }}:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.frontend_image }}:${{ inputs.tag }}