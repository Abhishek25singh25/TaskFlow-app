name: Docker build and push

on:
  workflow_call:
    inputs:
      backend_image:
        type: string
        required: true
      frontend_image:
        type: string
        required: true
      tag:
        type: string
        required: false
        default: latest
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_TOKEN:
        required: true

jobs:
  docker:
    runs-on: ubuntu-latest     

    steps:
      - name: Checkout code 
        uses: actions/checkout@v4

      - name: Docker login
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🔹 Backend
      - name: Backend build
        env:
          USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: docker build -t $USERNAME/${{ inputs.backend_image }}:${{ github.sha }} ./backend

      - name: Backend tag
        env:
          USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: docker tag $USERNAME/${{ inputs.backend_image }}:${{ github.sha }} $USERNAME/${{ inputs.backend_image }}:${{ inputs.tag }}

      - name: Backend push
        env:
          USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          docker push $USERNAME/${{ inputs.backend_image }}:${{ github.sha }}
          docker push $USERNAME/${{ inputs.backend_image }}:${{ inputs.tag }}

      # 🔹 Frontend
      - name: Frontend build
        env:
          USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: docker build -t $USERNAME/${{ inputs.frontend_image }}:${{ github.sha }} ./frontend

      - name: Frontend tag
        env:
          USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: docker tag $USERNAME/${{ inputs.frontend_image }}:${{ github.sha }} $USERNAME/${{ inputs.frontend_image }}:${{ inputs.tag }}

      - name: Frontend push
        env:
          USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          docker push $USERNAME/${{ inputs.frontend_image }}:${{ github.sha }}
          docker push $USERNAME/${{ inputs.frontend_image }}:${{ inputs.tag }}