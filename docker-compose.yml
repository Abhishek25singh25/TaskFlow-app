version: "3.9"
services:
  backend:
    build:
      context: ./backend
    ports: 
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/taskflow
    depends_on:
       mongodb:
         condition: service_healthy

  mongodb:
    image: mongo
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh","--eval","db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  mongo-data:
        
